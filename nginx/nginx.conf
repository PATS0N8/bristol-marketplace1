# Required Nginx events block
# Handles connection processing settings
events {}

# Main HTTP configuration block
http {

    # Defines a web server instance
    server {

        # Nginx listens for incoming HTTP requests on port 80
        listen 80;

        # Handles all routes/URLs for the application
        location / {

            # Forwards requests to the Django web container
            # "web" is the Docker Compose service name
            # Django runs internally on port 8000
            proxy_pass http://web:8000;

            # Passes the original host header to Django
            proxy_set_header Host $host;

            # Passes the client's real IP address
            proxy_set_header X-Real-IP $remote_addr;

            # Preserves forwarding/proxy chain information
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
