{% extends "base.html" %}

{% block title %}Register Producer | Bristol Marketplace{% endblock %}

{% block content %}
<h2 class="section-title">Register as Producer</h2>

<div class="panel" style="max-width: 520px;">
    {% if error %}
        <p style="color:#dc2626; font-weight:bold;">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        <p><label><strong>Username</strong></label><br><input type="text" name="username" required style="width:100%;"></p>
        <p><label><strong>Email</strong></label><br><input type="text" name="email" style="width:100%;"></p>
        <p><label><strong>Password</strong></label><br><input type="password" name="password" required style="width:100%;"></p>
        <button class="btn btn-primary" type="submit">Create Producer Account</button>
    </form>
</div>
{% endblock %}
