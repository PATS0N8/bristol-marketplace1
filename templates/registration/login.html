{% extends "base.html" %}

{% block title %}Login | Bristol Marketplace{% endblock %}

{% block content %}
<h2 class="section-title">Login</h2>

<div class="panel" style="max-width: 520px;">
    {% if error %}
        <p style="color:#dc2626; font-weight:bold;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label><strong>Username</strong></label><br>
            <input type="text" name="username" required style="width:100%;">
        </p>

        <p>
            <label><strong>Password</strong></label><br>
            <input type="password" name="password" required style="width:100%;">
        </p>

        <p>
            <label><strong>Login as</strong></label><br>
            <select name="account_type" required style="width:100%;">
                <option value="site">Customer / Producer</option>
                <option value="admin">Admin</option>
            </select>
        </p>

        <button class="btn btn-primary" type="submit">Login</button>
    </form>

    <hr style="margin:20px 0;">
    <p><a class="btn btn-secondary" href="/register/customer/">Register as Customer</a></p>
    <p><a class="btn btn-secondary" href="/register/producer/">Register as Producer</a></p>
</div>
{% endblock %}
