{% extends "base.html" %}

{% block title %}Account Settings | Bristol Marketplace{% endblock %}

{% block content %}
<h2 class="section-title">Account Settings</h2>

<div class="panel" style="max-width: 760px;">
    {% if success %}
        <p style="color:#16a34a; font-weight:bold;">Settings saved successfully.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label><strong>Email</strong></label><br>
            <input type="text" name="email" value="{{ user.email }}" style="width:100%;">
        </p>

        {% if user.role == "PRODUCER" and profile %}
        <p>
            <label><strong>Business Name</strong></label><br>
            <input type="text" name="business_name" value="{{ profile.business_name }}" style="width:100%;">
        </p>

        <p>
            <label><strong>Location</strong></label><br>
            <input type="text" name="location" value="{{ profile.location }}" style="width:100%;" placeholder="e.g. Clifton, Bristol">
        </p>

        <p>
            <label><strong>Postcode</strong></label><br>
            <input type="text" name="postcode" value="{{ profile.postcode }}" style="width:100%;">
        </p>

        <p>
            <label><strong>Farm Story</strong></label><br>
            <textarea name="farm_story" rows="5" style="width:100%; padding:10px; border-radius:12px; border:1px solid #cfd8cf;">{{ profile.farm_story }}</textarea>
        </p>
        {% endif %}

        <button class="btn btn-primary" type="submit">Save Settings</button>
    </form>
</div>
{% endblock %}
