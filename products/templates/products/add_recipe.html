{% extends "base.html" %}
{% block title %}Add Recipe | Bristol Marketplace{% endblock %}
{% block content %}
<h2 class="section-title">Add Recipe for {{ product.name }}</h2>
<div class="panel" style="max-width: 760px;">
    <form method="post">
        {% csrf_token %}
        <p>
            <label><strong>Recipe Title</strong></label><br>
            <input type="text" name="title" required style="width:100%;">
        </p>
        <p>
            <label><strong>Ingredients</strong></label><br>
            <textarea name="ingredients" rows="5" style="width:100%; padding:10px; border-radius:12px; border:1px solid #cfd8cf;" placeholder="One ingredient per line..."></textarea>
        </p>
        <p>
            <label><strong>Instructions</strong></label><br>
            <textarea name="instructions" rows="8" style="width:100%; padding:10px; border-radius:12px; border:1px solid #cfd8cf;" placeholder="Step by step instructions..."></textarea>
        </p>
        <button class="btn btn-primary" type="submit">Save Recipe</button>
    </form>
</div>
{% endblock %}
