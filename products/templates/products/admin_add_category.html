{% extends "base.html" %}

{% block title %}Add Category | Bristol Marketplace{% endblock %}

{% block content %}
<h2 class="section-title">Add Category</h2>

<div class="panel" style="max-width: 760px;">
    {% if error %}
        <p style="color:#dc2626; font-weight:bold;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <p>
            <label><strong>Category Name</strong></label><br>
            <input type="text" name="name" required style="width:100%;">
        </p>

        <button class="btn btn-primary" type="submit">Create Category</button>
    </form>
</div>
{% endblock %}
